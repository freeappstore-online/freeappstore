name: Refresh Quality Scores
on:
  schedule:
    - cron: '0 6 * * *' # daily at 6am UTC
  workflow_dispatch:
jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: mkdir -p dist/quality && node scripts/fetch-quality-scores.js
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/quality/scores.json
          git diff --cached --quiet || git commit -m "Refresh quality scores [skip ci]"
          git push
