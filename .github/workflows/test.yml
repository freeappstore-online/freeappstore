name: Test

# Runs the build + security regression suite on every PR and every push to
# main. Cheap — Node-only, no install of third-party deps. Cancels the
# previous run on rapid pushes so the PR badge tracks the latest commit.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Design system lint
        run: bash scripts/check-design-system.sh .
      - run: npm test
