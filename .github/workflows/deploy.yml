name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  # Scheduled rebuild every 6 hours so the per-app "Recent updates"
  # sections on detail pages reflect commits creators push to their
  # OWN repos — without this, the inline 3-commit list stays frozen
  # until the next storefront-repo push.
  schedule:
    - cron: '0 */6 * * *'
  # Manual trigger: lets a creator (or a future fas CLI helper) force
  # an immediate refresh after publishing a hot fix to their app.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # GITHUB_TOKEN lifts the GitHub API rate limit from 60 → 5000 req/hr,
      # which build.js needs to fetch each app's commit history at build
      # time without the deploy ever rate-limiting.
      - run: node build.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npx wrangler pages deploy dist --project-name=freeappstore
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: c1089bfcc43c1c6c2aa89e584e86f0bc
