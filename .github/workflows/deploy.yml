name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  # Scheduled rebuild every 6 hours so the per-app "Recent updates"
  # sections on detail pages reflect commits creators push to their
  # OWN repos — without this, the inline 3-commit list stays frozen
  # until the next storefront-repo push.
  schedule:
    - cron: '0 */6 * * *'
  # Manual trigger: lets a creator (or a future fas CLI helper) force
  # an immediate refresh after publishing a hot fix to their app.
  workflow_dispatch:

# Need write access so we can commit the refreshed commit-history cache
# back to the repo. Without this, CF Pages' parallel no-token build
# never sees the fresh data.
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # GITHUB_TOKEN lifts the GitHub API rate limit from 60 → 5000 req/hr,
      # which build.js needs to fetch each app's commit history at build
      # time without the deploy ever rate-limiting.
      - run: node build.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Persist the refreshed history cache so CF Pages' no-token build
      # can read it instead of hitting the rate-limited API. [skip ci]
      # keeps this commit from re-triggering deploy.yml's push handler;
      # the schedule still fires every 6h to refresh.
      #
      # Race-resistance: if the schedule and a push both fire, both runs
      # may try to commit the cache. We pull --rebase before push and
      # retry once with a re-stage so a non-fast-forward doesn't block
      # the deploy. Beyond two collisions we accept the loss — the next
      # cron tick fixes it within 6h.
      - name: Commit refreshed commit-history cache
        run: |
          if git diff --quiet data/commit-history.json 2>/dev/null; then
            echo "No history changes to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/commit-history.json
          git commit -m "Refresh commit-history cache [skip ci]"
          for attempt in 1 2; do
            if git push; then
              echo "Pushed cache on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed — rebasing on remote and retrying."
            # Stash our cache change, rebase, re-apply, recommit.
            git fetch origin main
            git reset --soft HEAD~1
            git stash --include-untracked --quiet
            git rebase origin/main
            git stash pop --quiet
            git add data/commit-history.json
            git commit -m "Refresh commit-history cache [skip ci]" --allow-empty
          done
          echo "Two push attempts failed; leaving cache uncommitted."
          echo "Next cron tick will retry. Build output is still correct."

      - run: npx wrangler pages deploy dist --project-name=freeappstore
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: c1089bfcc43c1c6c2aa89e584e86f0bc
